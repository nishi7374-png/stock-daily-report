name: 毎日の株式観察レポート

on:
  schedule:
   
    - cron: '30 8 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # レポートファイルをpushするために必要

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリのインストール
        run: |
          pip install anthropic yfinance pandas numpy

      - name: レポート生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_report.py

      - name: レポートをコミット＆プッシュ
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ index.html data/previous.json note/
          git diff --staged --quiet || git commit -m "📊 観察レポート $(date +'%Y-%m-%d')"
          git push
